<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupportSync | Takachar</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <div class="container">
        <header class="hero">
            <h1>Welcome to SupportSync</h1>
            <p>Takachar's centralized customer feedback and support platform.</p>
        </header>

        <main class="actions">
            <div sec:authorize="isAnonymous()" class="auth-buttons">
                <a th:href="@{/login}" class="btn btn-primary">Log In</a>
                <a th:href="@{/register}" class="btn btn-secondary">Register</a>
            </div>
            
            <div sec:authorize="isAuthenticated()" class="dashboard-actions">
                <p>Welcome back! You are logged in.</p>
                <form th:action="@{/logout}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button type="submit" class="btn btn-danger">Log Out</button>
                </form>
            </div>
        </main>
    </div>
</body>
</html>
