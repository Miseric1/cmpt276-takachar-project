<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Dashboard | SupportSync</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="dashboard-body">
    <div class="dashboard-shell">

        <header class="dashboard-topbar">
            <div>
                <h1>Customer Dashboard</h1>
                <p>Welcome, <span th:text="${email}">customer@example.com</span></p>
            </div>

            <form th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button type="submit" class="btn btn-danger btn-inline">Log Out</button>
            </form>
        </header>

        <div class="alert alert-success" th:if="${param.submitted}">
            Feedback submitted successfully.
        </div>

        <section class="dashboard-card">
            <h2>Submit Feedback</h2>
            <p class="dashboard-subtext">Let us know what's working, what isn't, or what you'd like to see next.</p>

            <form th:action="@{/customer/feedback}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" name="category" required>
                        <option value="">Select a category</option>
                        <option value="PRODUCT">Product</option>
                        <option value="TECHNICAL">Technical Issue</option>
                        <option value="SERVICE">Customer Service</option>
                        <option value="OTHER">Other</option>
                    </select>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="project">Project</label>
                        <input id="project" name="project" type="text" required />
                    </div>

                    <div class="form-group">
                        <label for="account">Company or Account</label>
                        <input id="account" name="account" type="text" required />
                    </div>
                </div>

                <div class="form-group">
                    <label for="description">Feedback Description</label>
                    <textarea
                        id="description"
                        name="description"
                        rows="6"
                        placeholder="Describe the issue or feedback in detail..."
                        required
                    ></textarea>
                </div>

                <button type="submit" class="btn btn-primary">Submit Feedback</button>
            </form>
        </section>

    </div>
</body>
</html>
