# =============================================================================
# Production datasource -- Supabase PostgreSQL
# -----------------------------------------------------------------------------
# The backend was migrated off Render's ephemeral PostgreSQL to Supabase, which
# is the permanent database provider. Every credential is supplied at runtime
# through environment variables; nothing sensitive is committed to the repo.
#
# See docs/SUPABASE_SETUP.md for how to obtain these values from a Supabase
# project and how to set them locally, in Docker, and on Render.
# =============================================================================

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# -----------------------------------------------------------------------------
# HikariCP connection pool.
# Supabase's connection pooler (pgBouncer, port 6543) multiplexes many clients
# onto a small number of real server connections, so the application-side pool
# is deliberately small. Override the sizes with env vars per environment.
# -----------------------------------------------------------------------------
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:5}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:1}
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=TakacharHikariPool

# -----------------------------------------------------------------------------
# JPA / Hibernate
# open-in-view is disabled so lazy associations are only touched inside the
# service transaction (mappers do this); this avoids accidental N+1 loads in the
# view layer. ddl-auto stays "update" to match the existing project workflow.
# -----------------------------------------------------------------------------
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
