spring.application.name=demo
spring.datasource.url=jdbc:h2:file:./data/supportsync
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
 
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Keep lazy-loading behaviour identical to production (Supabase profile).
# Service methods map entities to DTOs inside their own transaction, so the
# view layer never triggers lazy initialisation on its own.
spring.jpa.open-in-view=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Pagination guardrails for every endpoint that accepts a Pageable.
spring.data.web.pageable.default-page-size=20
spring.data.web.pageable.max-page-size=100
spring.data.web.pageable.one-indexed-parameters=false
