# Test datasource: an isolated in-memory H2 so tests never touch the dev file
# database and always start from a clean schema.
spring.datasource.url=jdbc:h2:mem:takachar-test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.h2.console.enabled=false

spring.data.web.pageable.default-page-size=20
spring.data.web.pageable.max-page-size=100

# Disables the FAQ placeholder-seeding CommandLineRunner (see DataInitializer)
# for all tests, so seeded demo articles never leak into a test's database and
# break search/count assertions that expect only their own fixture data.
app.seed-demo-data=false